<svg width="1100" height="520" viewBox="0 0 1100 520" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="title desc">
  <title id="title">Xiaodong · Profile Hero</title>
  <desc id="desc">A refined pastel profile banner for Xiaodong — building web systems, team tools, and AI for urban safety.</desc>
  <defs>
    <linearGradient id="paper" x1="0" y1="0" x2="1100" y2="520" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#FFF9F2"/>
      <stop offset="0.45" stop-color="#F3FAF7"/>
      <stop offset="1" stop-color="#F7F2FF"/>
    </linearGradient>
    <linearGradient id="peach" x1="168" y1="72" x2="880" y2="474" gradientUnits="userSpaceOnUse">
      <stop stop-color="#F7B7A3"/>
      <stop offset="0.5" stop-color="#9ED9C5"/>
      <stop offset="1" stop-color="#C8B6FF"/>
    </linearGradient>
    <radialGradient id="sun" cx="0" cy="0" r="1" gradientUnits="userSpaceOnUse" gradientTransform="translate(840 126) rotate(122) scale(310 220)">
      <stop stop-color="#FFD6A5" stop-opacity="0.74"/>
      <stop offset="0.66" stop-color="#FFE8D6" stop-opacity="0.32"/>
      <stop offset="1" stop-color="#FFE8D6" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="mintGlow" cx="0" cy="0" r="1" gradientUnits="userSpaceOnUse" gradientTransform="translate(232 404) rotate(22) scale(286 168)">
      <stop stop-color="#B7E4D1" stop-opacity="0.56"/>
      <stop offset="1" stop-color="#B7E4D1" stop-opacity="0"/>
    </radialGradient>
    <filter id="shadow" x="-20%" y="-24%" width="140%" height="150%">
      <feDropShadow dx="0" dy="18" stdDeviation="20" flood-color="#B08968" flood-opacity="0.13"/>
    </filter>
    <filter id="softBlur" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="10"/>
    </filter>
    <pattern id="grain" width="88" height="88" patternUnits="userSpaceOnUse">
      <circle cx="12" cy="18" r="1.2" fill="#C8A27A" opacity="0.11"/>
      <circle cx="54" cy="22" r="0.9" fill="#6B8F71" opacity="0.1"/>
      <circle cx="32" cy="58" r="1" fill="#B185DB" opacity="0.08"/>
      <circle cx="76" cy="70" r="0.8" fill="#C8A27A" opacity="0.1"/>
    </pattern>
    <style>
      .serif { font-family: "Cormorant Garamond", "Playfair Display", Georgia, "Times New Roman", serif; }
      .sans { font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", Arial, sans-serif; }
      .script { font-family: "Brush Script MT", "Segoe Script", "Snell Roundhand", cursive; }
      .title { fill: #2F3B32; font-size: 72px; font-weight: 600; font-style: italic; }
      .subtitle { fill: #5F6F64; font-size: 20px; font-weight: 500; }
      .quote { fill: #7A6C5D; font-size: 23px; font-weight: 500; font-style: italic; }
      .cardTitle { fill: #34483B; font-size: 20px; font-weight: 700; }
      .cardBody { fill: #6A746B; font-size: 14px; font-weight: 500; }
      .tag { fill: #7B6F62; font-size: 13px; font-weight: 700; letter-spacing: 1.6px; }
      .fade { opacity: 0; animation: fadeLoop 9s ease-in-out infinite; }
      .rise { opacity: 0; transform: translateY(14px); animation: riseLoop 9s cubic-bezier(.2,.8,.2,1) infinite; }
      .driftA { animation: driftA 8s ease-in-out infinite; }
      .driftB { animation: driftB 10s ease-in-out infinite; }
      .draw { stroke-dasharray: 720; stroke-dashoffset: 720; animation: drawLoop 9s ease-in-out infinite; }
      .breathe { animation: breathe 5.6s ease-in-out infinite; transform-origin: center; }
      .delay1 { animation-delay: 160ms; }
      .delay2 { animation-delay: 380ms; }
      .delay3 { animation-delay: 620ms; }
      .delay4 { animation-delay: 860ms; }
      .delay5 { animation-delay: 1120ms; }
      @keyframes fadeLoop {
        0%, 8% { opacity: 0; }
        26%, 88% { opacity: 1; }
        100% { opacity: 0; }
      }
      @keyframes riseLoop {
        0%, 10% { opacity: 0; transform: translateY(14px); }
        32%, 88% { opacity: 1; transform: translateY(0); }
        100% { opacity: 0; transform: translateY(14px); }
      }
      @keyframes drawLoop {
        0%, 8% { stroke-dashoffset: 720; }
        48%, 88% { stroke-dashoffset: 0; }
        100% { stroke-dashoffset: 720; }
      }
      @keyframes breathe { 0%,100% { transform: scale(1); opacity: .62; } 50% { transform: scale(1.035); opacity: .86; } }
      @keyframes driftA { 0%,100% { transform: translate(0,0) rotate(0deg); } 50% { transform: translate(12px,-12px) rotate(1.5deg); } }
      @keyframes driftB { 0%,100% { transform: translate(0,0) rotate(0deg); } 50% { transform: translate(-10px,14px) rotate(-1.2deg); } }
      @media (prefers-reduced-motion: reduce) {
        .fade, .rise, .driftA, .driftB, .draw, .breathe { animation: none; opacity: 1; transform: none; stroke-dashoffset: 0; }
      }
    </style>
  </defs>

  <rect width="1100" height="520" rx="34" fill="url(#paper)"/>
  <rect width="1100" height="520" rx="34" fill="url(#sun)"/>
  <rect width="1100" height="520" rx="34" fill="url(#mintGlow)"/>
  <rect width="1100" height="520" rx="34" fill="url(#grain)" opacity="0.78"/>

  <g filter="url(#shadow)">
    <rect x="42" y="38" width="1016" height="444" rx="34" fill="#FFFDF8" fill-opacity="0.72" stroke="#F1D7C4"/>
  </g>

  <g class="breathe" opacity="0.8">
    <circle cx="872" cy="136" r="76" fill="#FFD6A5" filter="url(#softBlur)" opacity="0.48"/>
    <circle cx="224" cy="392" r="82" fill="#CDEFE0" filter="url(#softBlur)" opacity="0.48"/>
    <circle cx="960" cy="386" r="64" fill="#E9D5FF" filter="url(#softBlur)" opacity="0.38"/>
  </g>

  <g class="driftA">
    <path class="draw" d="M812 410 C852 354 872 294 858 232 C850 196 828 168 790 148" stroke="#76A988" stroke-width="2.4" stroke-linecap="round" fill="none"/>
    <path d="M836 330 C866 322 882 338 882 338 C858 352 842 344 836 330Z" fill="#9ED9C5" opacity="0.58"/>
    <path d="M846 262 C814 252 800 268 800 268 C824 286 842 278 846 262Z" fill="#C8B6FF" opacity="0.46"/>
    <path d="M824 180 C850 174 866 186 866 186 C846 202 830 194 824 180Z" fill="#F7B7A3" opacity="0.5"/>
  </g>

  <g class="driftB">
    <path class="draw delay1" d="M190 140 C238 194 248 266 224 332 C210 370 184 402 146 426" stroke="#B88C6A" stroke-width="2.2" stroke-linecap="round" fill="none"/>
    <path d="M218 220 C188 210 174 226 174 226 C196 244 214 236 218 220Z" fill="#F6C6B4" opacity="0.56"/>
    <path d="M218 304 C250 292 266 310 266 310 C240 330 222 320 218 304Z" fill="#B7E4D1" opacity="0.58"/>
    <path d="M176 396 C148 388 134 402 134 402 C156 420 172 412 176 396Z" fill="#DCC7FF" opacity="0.5"/>
  </g>

  <path d="M92 94 H302" stroke="url(#peach)" stroke-width="3.5" stroke-linecap="round"/>
  <path d="M798 444 H1008" stroke="url(#peach)" stroke-width="3.5" stroke-linecap="round"/>

  <g class="fade">
    <text x="92" y="132" class="sans tag">WEB SYSTEMS · TEAM TOOLS · URBAN SAFETY</text>
    <text x="92" y="218" class="serif title">Xiaodong</text>
    <text x="98" y="252" class="script" fill="#9A6B55" font-size="34">crafting systems with clarity and care</text>
    <text x="96" y="292" class="sans subtitle">Developer · Web Apps · Collaboration Tools · City Safety AI</text>
  </g>

  <g class="rise delay2">
    <rect x="96" y="332" width="380" height="88" rx="24" fill="#FFFFFF" fill-opacity="0.68" stroke="#EED8C9"/>
    <text x="126" y="367" class="serif cardTitle">About Me</text>
    <text x="126" y="396" class="sans cardBody">I build practical web systems and team workflows,</text>
    <text x="126" y="417" class="sans cardBody">and explore how AI can make cities safer.</text>
  </g>

  <g class="rise delay3">
    <rect x="514" y="332" width="148" height="88" rx="24" fill="#FFFFFF" fill-opacity="0.64" stroke="#CDE7DA"/>
    <text x="538" y="368" class="serif cardTitle" font-size="18">Web Apps</text>
    <text x="538" y="394" class="sans cardBody">Frontend</text>
    <text x="538" y="414" class="sans cardBody">Full-stack</text>
  </g>
  <g class="rise delay4">
    <rect x="686" y="332" width="148" height="88" rx="24" fill="#FFFFFF" fill-opacity="0.64" stroke="#E7D7F8"/>
    <text x="710" y="368" class="serif cardTitle" font-size="18">Team Sys</text>
    <text x="710" y="394" class="sans cardBody">Workflows</text>
    <text x="710" y="414" class="sans cardBody">Collaboration</text>
  </g>
  <g class="rise delay5">
    <rect x="858" y="332" width="148" height="88" rx="24" fill="#FFFFFF" fill-opacity="0.64" stroke="#F0D1C4"/>
    <text x="882" y="368" class="serif cardTitle" font-size="18">Urban AI</text>
    <text x="882" y="394" class="sans cardBody">Safety tools</text>
    <text x="882" y="414" class="sans cardBody">Smart cities</text>
  </g>

  <g class="fade delay5">
    <text x="606" y="150" class="serif quote">"Ship with taste. Learn in public.</text>
    <text x="646" y="184" class="serif quote">Build what lasts."</text>
  </g>
</svg>
